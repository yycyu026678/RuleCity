      /* Rule City - Red & Black Theme */
      :root {
        --rc-red: #cc0000;

        border-bottom: 2px solid var(--rc-red) !important;

    <script id="md-click">
              window.mdClick = e => {
                const target = e.target;
                const {href, target: linkTarget} = target.dataset;
                const appType = 'web';
                const isBlank = linkTarget === '_blank';

                if (!href) return;

                e.stopPropagation();
                e.preventDefault();

                if (isBlank || href.startsWith('http')) {
                  let finalHref = href;
                  if (appType === 'miniapp' && !href.startsWith('http')) {
                    finalHref = window.location.href.split('#')[0] + '#/' + href;
                  }
                  window.open(finalHref, linkTarget || '_self');
                  return;
                }

                const finalHref = href.startsWith('/') ? href : '/' + href;
                if (appType === 'miniapp') {
                  window.location.hash = finalHref;
                  window.dispatchEvent(new HashChangeEvent('hashchange'));
                } else {
                  window.history.pushState({}, '', finalHref);
                  window.dispatchEvent(new Event('popstate'));
                }
              };
              document.addEventListener('click', window.mdClick, true);
            </script>

    <script id="iframe-onerror-catcher">
              const observer = new PerformanceObserver((list) => {
                list.getEntries().forEach((entry) => {
                  if (entry.initiatorType === 'script' && entry.responseStatus >= 400) {
                    window.parent.postMessage({
                      type: "RESOURCE_LOAD_ERROR",
                      name: entry.name,
                      status: entry.responseStatus
                    }, "*");
                    console.warn('[iframe-error] Resource failed:', entry.name, entry.responseStatus);
                  }
                });
              });
              observer.observe({ type: 'resource', buffered: true });
            </script>

    <!-- Replace copyright text after page loads -->
    <script id="rc-copyright-patcher">
      (function patchCopyright() {
        function replaceCopyrightText() {
          const walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
          );
          let node;
          while ((node = walker.nextNode())) {
            const text = node.nodeValue;
            if (
              text &&
              (text.includes('RTG') ||
               text.includes('Miaoda') ||
               text.includes('miaoda') ||
               text.includes('©') ||
               text.toLowerCase().includes('copyright') ||
               text.toLowerCase().includes('all rights reserved'))
            ) {
              const newText = text
                .replace(/RTG\s*Cfw/gi, 'Rule City')
                .replace(/RTG/gi, 'Rule City')
                .replace(/Miaoda/gi, 'Rule City')
                .replace(/miaoda/gi, 'Rule City')
                .replace(/All Rights Reserved/gi, '© 2025 Rule City. All Rights Reserved.');
              if (newText !== text) {
                node.nodeValue = newText;
              }
            }
          }
        }

        // Run on load and watch for dynamic content
        window.addEventListener('load', replaceCopyrightText);
        setTimeout(replaceCopyrightText, 1000);
        setTimeout(replaceCopyrightText, 3000);

        const obs = new MutationObserver(() => replaceCopyrightText());
        obs.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
